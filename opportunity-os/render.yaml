services:
  - type: web
    name: opportunity-os
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: DEMO_MODE
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
